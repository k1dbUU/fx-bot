name: Nucleus — Agent Workflow (24/7)
# Operator: Nucleus Operator
# v3 CHANGES:
#   1. Workflow renamed from FX-centric name to Nucleus Agent Workflow
#   2. OPERATOR_ALIAS updated to Nucleus Operator (alias migration Step 1)
#   3. LENS Agent added — video intelligence, every 15min (offset 7-57/15)
#      capped at 2 links/run, 20min timeout for Whisper
# All secrets via GitHub Secrets — nothing hardcoded

on:
  schedule:
    # ── Supervisor: every 5min always (xx:00, xx:05, xx:10...)
    - cron: "*/5 * * * *"

    # ── Job Agent: every 5min, offset by 2min (xx:02, xx:07, xx:12...)
    #    MUST be a different cron string from Supervisor or GitHub deduplicates
    - cron: "2-57/5 * * * *"

    # ── FX Agent: every 5min Mon-Thu session 13:00-19:55 UTC (15:00 SAST)
    - cron: "*/5 13-19 * * 1-4"

    # ── FX Agent: NY AM Silver Bullet window
    - cron: "0 10 * * 1-4"

    # ── Email Sanitizer: every 30min always
    - cron: "*/30 * * * *"

    # ── LENS Agent: every 15min always (offset 7min to avoid Supervisor collision)
    - cron: "7-57/15 * * * *"

  workflow_dispatch:

jobs:

  # ── NUCLEUS SUPERVISOR (every 5min, always on) ─────────────────
  supervisor:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    name: Nucleus Supervisor
    if: |
      github.event_name == 'workflow_dispatch' ||
      github.event.schedule == '*/5 * * * *'

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install httpx

      - name: Run Nucleus Supervisor
        env:
          ANTHROPIC_API_KEY:  ${{ secrets.ANTHROPIC_API_KEY }}
          GMAIL_FROM:         ${{ secrets.GMAIL_FROM }}
          GMAIL_TO:           ${{ secrets.GMAIL_TO }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          GH_PAT:             ${{ secrets.GH_PAT }}
          OPERATOR_ALIAS:     "Nucleus Operator"
        run: python nucleus_supervisor.py

      - name: Commit supervisor outputs
        if: always()
        run: |
          git config user.name  "nucleus-bot"
          git config user.email "bot@nucleus.local"
          git add cortex_log.json NUCLEUS_MEMORY.json shopify_build_log.json \
                  nucleus_command.json nucleus_email_log.json nucleus_task_log.json \
                  nucleus_heal_log.json || true
          git diff --staged --quiet || git commit -m "supe: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git pull --rebase origin main || true
          git push || true

  # ── FX AGENT (session hours only) ─────────────────────────────
  fx-agent:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    name: FX Agent
    if: |
      github.event_name == 'workflow_dispatch' ||
      github.event.schedule == '*/5 13-19 * * 1-4' ||
      github.event.schedule == '0 10 * * 1-4'

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install metaapi-cloud-sdk httpx

      - name: Init state.json if missing
        run: |
          if [ ! -f state.json ]; then
            echo '{"date":"2000-01-01","daily_losses":{"GOLD#":0,"EURUSD":0,"GBPUSD":0},"swept_high":{"GOLD#":false,"EURUSD":false,"GBPUSD":false},"swept_low":{"GOLD#":false,"EURUSD":false,"GBPUSD":false},"sb_london":{"GOLD#":false,"EURUSD":false,"GBPUSD":false},"sb_ny_am":{"GOLD#":false,"EURUSD":false,"GBPUSD":false},"sb_ny_pm":{"GOLD#":false,"EURUSD":false,"GBPUSD":false}}' > state.json
            echo "state.json created"
          else
            echo "state.json exists — keeping"
          fi

      - name: Run FX Agent
        env:
          META_API_TOKEN:  ${{ secrets.META_API_TOKEN }}
          META_ACCOUNT_ID: ${{ secrets.META_ACCOUNT_ID }}
        run: python fx_agent_bot.py

      - name: Commit FX outputs
        if: always()
        run: |
          git config user.name  "nucleus-bot"
          git config user.email "bot@nucleus.local"
          git add state.json status.json || true
          git diff --staged --quiet || git commit -m "fx: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git pull --rebase origin main || true
          git push || true

  # ── JOB AGENT (every 5min offset — 12min hard cap) ─────────────
  job-agent:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    name: Job Agent
    if: |
      github.event_name == 'workflow_dispatch' ||
      github.event.schedule == '2-57/5 * * * *'

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install httpx

      - name: Load CV and tracking files
        run: |
          echo '${{ secrets.CV_DATA_JSON }}' > cv_data.json
          [ -f applied_jobs.json ] || echo '{}' > applied_jobs.json
          [ -f bounced_emails.json ] || echo '[]' > bounced_emails.json
          echo "Files ready"

      - name: Check for pending command
        run: |
          if [ -f nucleus_command.json ]; then
            STATUS=$(python3 -c "import json; d=json.load(open('nucleus_command.json')); print(d.get('status','pending'))" 2>/dev/null || echo "pending")
            if [ "$STATUS" = "pending" ]; then
              echo "NUCLEUS_COMMAND_PENDING=true" >> $GITHUB_ENV
            else
              echo "NUCLEUS_COMMAND_PENDING=false" >> $GITHUB_ENV
            fi
          else
            echo "NUCLEUS_COMMAND_PENDING=false" >> $GITHUB_ENV
          fi

      - name: Run Job Agent
        env:
          ANTHROPIC_API_KEY:    ${{ secrets.ANTHROPIC_API_KEY }}
          GMAIL_FROM:           ${{ secrets.GMAIL_FROM }}
          GMAIL_APP_PASSWORD:   ${{ secrets.GMAIL_APP_PASSWORD }}
          OPERATOR_ALIAS:       "Nucleus Operator"
          NUCLEUS_COMMAND_FILE: nucleus_command.json
        run: python nucleus_job_agent.py

      - name: Save tracking files
        if: always()
        run: |
          git config user.name  "nucleus-bot"
          git config user.email "bot@nucleus.local"
          git add applied_jobs.json bounced_emails.json job_agent_log.txt job_agent_status.json || true
          git diff --staged --quiet || git commit -m "jobs: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git pull --rebase origin main || true
          git push || true

  # ── EMAIL SANITIZER (every 30min, 24/7 deep clean) ─────────────
  email-sanitizer:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    name: Email Sanitizer
    if: |
      github.event_name == 'workflow_dispatch' ||
      github.event.schedule == '*/30 * * * *'

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install httpx

      - name: Run Email Sanitizer
        env:
          ANTHROPIC_API_KEY:  ${{ secrets.ANTHROPIC_API_KEY }}
          GMAIL_FROM:         ${{ secrets.GMAIL_FROM }}
          GMAIL_TO:           ${{ secrets.GMAIL_TO }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          OPERATOR_ALIAS:     "Nucleus Operator"
        run: python nucleus_email_sanitizer.py

      - name: Commit sanitizer outputs
        if: always()
        run: |
          git config user.name  "nucleus-bot"
          git config user.email "bot@nucleus.local"
          git add email_sanitizer_status.json email_purge_log.json || true
          git diff --staged --quiet || git commit -m "email: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git pull --rebase origin main || true
          git push || true

  # ── LENS AGENT (every 15min — video intelligence) ───────────────
  lens-agent:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    name: LENS Agent
    if: |
      github.event_name == 'workflow_dispatch' ||
      github.event.schedule == '7-57/15 * * * *'

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system dependencies (ffmpeg for Whisper)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg

      - name: Install Python dependencies
        run: |
          pip install yt-dlp httpx
          pip install openai-whisper

      - name: Run LENS Agent
        env:
          ANTHROPIC_API_KEY:  ${{ secrets.ANTHROPIC_API_KEY }}
          GMAIL_FROM:         ${{ secrets.GMAIL_FROM }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: python nucleus_lens_agent.py

      - name: Commit LENS outputs
        if: always()
        run: |
          git config user.name  "nucleus-bot"
          git config user.email "bot@nucleus.local"
          git add lens_queue.json lens_log.json lens_agent_status.json nucleus_command.json || true
          git diff --staged --quiet || git commit -m "lens: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git pull --rebase origin main || true
          git push || true
